name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Grant the automation script explicit permission to upload releases and assets
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd frontend
          yarn install --ignore-engines

      - name: Build React app
        run: |
          cd frontend
          yarn build

      - name: Add Capacitor Android
        run: |
          cd frontend
          npx cap add android

      - name: Sync Capacitor
        run: |
          cd frontend
          npx cap sync android

      - name: Build APK
        run: |
          cd frontend/android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClanChat-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release and Upload APK Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
