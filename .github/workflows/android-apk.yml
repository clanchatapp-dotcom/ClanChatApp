name: Build Android APK

# Builds a debug-signed APK for ClanChat on every push to main and on every
# manually-triggered run. The APK is uploaded as a workflow artifact that
# testers can download directly from the Actions tab — no Android Studio
# required on the user's machine.
#
# Workflow Dispatch URL (after first push):
#   https://github.com/<your-account>/<repo>/actions/workflows/android-apk.yml
#
# Each successful run produces:
#   - ClanChat-debug.apk  (sideload-ready, ~10 MB)
# Testers install it by enabling "Install unknown apps" for their browser
# or file manager on Android, then tapping the APK file.

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22 LTS — Node 20 hit deprecation on GitHub Actions runners in
      # late 2025. We intentionally DO NOT use the built-in `cache: yarn`
      # option because some forks of this repo don't commit frontend/yarn.lock,
      # and setup-node treats that as a hard failure. The yarn install below
      # generates the lockfile on the fly when missing.
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          # If yarn.lock is committed we honour it; otherwise we let yarn
          # generate one. Either way the APK still builds.
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile || yarn install
          else
            echo "::warning::frontend/yarn.lock not found in repo — generating a fresh lockfile (consider committing it for reproducible builds)."
            yarn install
          fi

      - name: Build web bundle
        working-directory: frontend
        env:
          # Production API base — testers' APK talks to the live deploy.
          # Override this to point at staging/preview if you fork the
          # workflow for testing branches.
          REACT_APP_BACKEND_URL: https://clanchat.app
          CI: "false"  # CRA treats warnings as errors when CI=true; we don't want that to fail the APK
        run: yarn build

      - name: Add Capacitor Android platform
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Inject Android media permissions
        working-directory: frontend/android/app/src/main
        run: |
          # Add READ_MEDIA_IMAGES + READ_MEDIA_VIDEO (Android 13+) and the
          # legacy READ_EXTERNAL_STORAGE for older devices, scoped to
          # <33 via maxSdkVersion. This lets users pick photos/videos for
          # posts and DMs after granting consent.
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("AndroidManifest.xml")
          x = p.read_text()
          perms = [
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />',
              '<uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />',
              '<uses-permission android:name="android.permission.CAMERA" />',
              # LiveKit voice/video calls need RECORD_AUDIO (mic). Network state
              # is needed so the SDK can negotiate ICE servers correctly.
              '<uses-permission android:name="android.permission.RECORD_AUDIO" />',
              '<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
              '<uses-feature android:name="android.hardware.camera" android:required="false" />',
              '<uses-feature android:name="android.hardware.microphone" android:required="false" />',
          ]
          for line in perms:
              if line.split('android:name="')[1].split('"')[0] not in x:
                  x = x.replace("<application", line + "\n    <application", 1)
          p.write_text(x)
          print("manifest patched:")
          print(x)
          PY

      - name: Copy launcher icons
        working-directory: frontend
        run: |
          # Skip silently when the source folder hasn't been committed yet —
          # Capacitor's default icons will be used.
          if [ ! -d android-resources ]; then
            echo "::warning::frontend/android-resources/ not found — using default Capacitor launcher icons."
            exit 0
          fi
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            src="android-resources/mipmap-$d"
            dest="android/app/src/main/res/mipmap-$d"
            if [ -d "$src" ]; then
              mkdir -p "$dest"
              cp "$src/ic_launcher.png" "$dest/ic_launcher.png" 2>/dev/null || true
              cp "$src/ic_launcher_round.png" "$dest/ic_launcher_round.png" 2>/dev/null || true
              cp "$src/ic_launcher_foreground.png" "$dest/ic_launcher_foreground.png" 2>/dev/null || true
            fi
          done

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        working-directory: frontend/android
        run: |
          src="app/build/outputs/apk/debug/app-debug.apk"
          mkdir -p ../../dist
          cp "$src" "../../dist/ClanChat-debug.apk"
          ls -lh ../../dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClanChat-debug-apk
          path: dist/ClanChat-debug.apk
          retention-days: 30
          if-no-files-found: error
