name: Build Android APK

# Builds a debug-signed APK for ClanChat on every push to main and on every
# manually-triggered run. The APK is uploaded as a workflow artifact that
# testers can download directly from the Actions tab — no Android Studio
# required on the user's machine.

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22 LTS
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Java 17 for matching native build compatibility
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          # Bypasses environment engine mismatches and forces packages to install cleanly
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile --ignore-engines || yarn install --ignore-engines
          else
            echo "::warning::frontend/yarn.lock not found in repo — generating a fresh lockfile."
            yarn install --ignore-engines
          fi

      - name: Build web bundle
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://clanchat.app
          CI: "false"
        run: yarn build

      - name: Add Capacitor Android platform
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Splice asset branding
        working-directory: frontend
        run: |
          # Safely injects branding images into the native workspace if present
          if [ ! -d android-resources ]; then
            echo "::warning::frontend/android-resources/ not found — using default Capacitor launcher icons."
            exit 0
          fi
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            src="android-resources/mipmap-$d"
            dest="android/app/src/main/res/mipmap-$d"
            if [ -d "$src" ]; then
              mkdir -p "$dest"
              cp "$src/ic_launcher.png" "$dest/ic_launcher.png" 2>/dev/null || true
              cp "$src/ic_launcher_round.png" "$dest/ic_launcher_round.png" 2>/dev/null || true
              cp "$src/ic_launcher_foreground.png" "$dest/ic_launcher_foreground.png" 2>/dev/null || true
            fi
          done

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        working-directory: frontend/android
        run: |
          src="app/build/outputs/apk/debug/app-debug.apk"
          mkdir -p ../../dist
          cp "$src" "../../dist/ClanChat-debug.apk"
          ls -lh ../../dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClanChat-debug-apk
          path: dist/ClanChat-debug.apk
          retention-days: 30
          if-no-files-found: error

